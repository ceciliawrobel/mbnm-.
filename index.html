<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checklist Tablet - Prefeitura de Castro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-container: #ffffff;
            --text-main: #333333;
            --text-pergunta: #34495e;
            --border-bloco: #eef2f5;
            --bg-label: #f8f9fa;
            --border-label: #dcdde1;
            --bg-input: #ffffff;
            --text-header: #2c3e50;
            --bg-secao: #ebf3f9;
            --text-secao: #2c3e50;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-main: #e0e0e0;
            --text-pergunta: #ffffff;
            --border-bloco: #2d2d2d;
            --bg-label: #2d2d2d;
            --border-label: #404040;
            --bg-input: #252525;
            --text-header: #1abc9c;
            --bg-secao: #1a252f;
            --text-secao: #1abc9c;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 8px; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: var(--bg-container); 
            padding: 15px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            position: relative;
            margin-top: 15px;
        }

        .header-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid var(--border-bloco);
            padding-bottom: 8px;
            margin-bottom: 12px;
            text-align: center;
        }

        .texto-institucional { font-size: 18px; font-weight: bold; color: var(--text-header); margin: 0; text-transform: uppercase; }
        .subtexto-institucional { font-size: 14px; font-weight: 600; color: var(--text-main); margin: 2px 0; }
        .setor-institucional { font-size: 14px; font-weight: bold; color: #1abc9c; margin: 0; text-transform: uppercase; }

        /* Estilização do Link Único da Pasta Geral */
        .pasta-drive-container {
            margin: 10px 0;
            text-align: center;
        }
        .link-pasta-drive {
            display: inline-block;
            background-color: #e1f5fe;
            color: #0056b3;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #b3e5fc;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .link-pasta-drive:hover {
            background-color: #b3e5fc;
        }
        [data-theme="dark"] .link-pasta-drive {
            color: #4fc3f7;
            background-color: #102a43;
            border: 1px solid #243b53;
        }

        .identificacao-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            background: var(--bg-label);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-label);
            margin-bottom: 15px;
        }
        @media (min-width: 600px) { .identificacao-container { grid-template-columns: 2fr 1fr 1fr; } }
        
        .campo-id { display: flex; flex-direction: column; gap: 3px; }
        .campo-id label { font-size: 11px; font-weight: bold; }
        .input-id { padding: 6px; border: 1px solid var(--border-label); border-radius: 4px; background: var(--bg-input); color: var(--text-main); font-size: 13px; }

        .secao-titulo {
            background-color: var(--bg-secao);
            color: var(--text-secao);
            padding: 6px 10px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 15px;
            margin-bottom: 5px;
            text-transform: uppercase;
            border-left: 4px solid #1abc9c;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        [data-theme="dark"] .theme-toggle { background-color: #f1c40f; color: #121212; }

        @media (max-width: 600px) {
            .container { margin-top: 40px; }
            .theme-toggle { top: -35px; right: 50%; transform: translateX(50%); }
        }
        
        .pergunta-bloco { padding: 8px 0; border-bottom: 1px solid var(--border-bloco); }
        .pergunta-texto { font-size: 13px; margin-bottom: 5px; font-weight: 600; color: var(--text-pergunta); line-height: 1.3; }
        .pergunta-peso { font-size: 11px; color: #7f8c8d; font-weight: normal; }

        .opcoes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 5px; }
        .opcoes label { 
            cursor: pointer; background: var(--bg-label); color: var(--text-main);
            padding: 6px 2px; border: 1px solid var(--border-label); border-radius: 4px; 
            font-size: 11px; font-weight: bold; text-align: center;
        }
        
        input[type="radio"] { display: none; }
        input[value="SIM"]:checked + label { background-color: #2ecc71 !important; color: white !important; border-color: #2ecc71 !important; }
        input[value="PARCIAL"]:checked + label { background-color: #f1c40f !important; color: white !important; border-color: #f1c40f !important; }
        input[value="NAO"]:checked + label { background-color: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        input[value="NO"]:checked + label { background-color: #95a5a6 !important; color: white !important; border-color: #95a5a6 !important; }
        
        .obs-input {
            width: 100%; box-sizing: border-box; background-color: var(--bg-input); color: var(--text-main);
            border: 1px solid var(--border-label); border-radius: 4px; padding: 5px;
            font-family: inherit; font-size: 11px; resize: none; height: 26px;
        }
        
        .botoes-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn-calcular { flex: 1; background-color: #1abc9c; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-pdf { flex: 1; background-color: #34495e; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; display: none; }
        
        #resultado { 
            margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; 
            font-size: 15px; background-color: #e8f8f5; color: #117a65; border: 1px solid #a3e4d7; 
        }
        [data-theme="dark"] #resultado { background-color: #164e43; color: #a3e4d7; border: 1px solid #1abc9c; }
        .grid-resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; font-size: 12px; text-align: left; }

        /* REGRAS DE IMPRESSÃO */
        @media print {
            @page { size: A4; margin: 8mm 8mm; }
            body { background: #ffffff !important; color: #000000 !important; padding: 0 !important; font-size: 11px !important; }
            .container { box-shadow: none !important; padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .theme-toggle, #blocoAcoes { display: none !important; }
            
            .ocultar-no-print { display: none !important; }
            
            /* Manter o link único visível e clicável no PDF */
            .pasta-drive-container { display: block !important; margin: 5px 0 !important; }
            .link-pasta-drive { 
                color: #0056b3 !important; 
                text-decoration: underline !important; 
                background: #f0f4f8 !important;
                border: 1px solid #cccccc !important;
                font-size: 11px !important;
                padding: 4px 10px !important;
                display: inline-block !important;
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }

            .secao-titulo { 
                background: #f2f2f2 !important; color: #000000 !important; 
                padding: 3px 5px !important; font-size: 11px !important; 
                margin-top: 8px !important; margin-bottom: 3px !important;
                border-left: 3px solid #000000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
            .pergunta-bloco { 
                page-break-inside: avoid; padding: 3px 0 !important; 
                border-bottom: 1px dotted #bbbbbb !important;
            }
            .pergunta-texto { font-size: 11px !important; margin-bottom: 2px !important; display: inline; }
            .pergunta-peso { font-size: 9px !important; color: #555555 !important; }
            
            .opcoes { display: inline-block !important; margin-left: 10px !important; margin-bottom: 0 !important; }
            .opcoes label { display: none !important; }
            .opcoes input:checked + label {
                display: inline-block !important; background: #e6e6e6 !important; 
                color: #000000 !important; border: 1px solid #000000 !important; 
                padding: 1px 5px !important; font-size: 10px !important; border-radius: 3px !important;
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
            
            .obs-container { margin-top: 1px !important; padding-left: 15px; }
            .obs-input { 
                border: none !important; background: transparent !important; 
                padding: 0 !important; height: auto !important; font-style: italic; color: #444444 !important;
            }
            .obs-input:placeholder-shown { display: none !important; }
            #resultado { 
                margin-top: 12px !important; padding: 10px !important; font-size: 13px !important;
                background: #f9f9f9 !important; border: 1px solid #000000 !important;
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="container" id="conteudoParaPDF">
    <button type="button" class="theme-toggle" onclick="alternarTema()" id="btnTema">Modo Dark 🌙</button>

    <div class="header-app">
        <div class="texto-institucional">Prefeitura Municipal de Castro</div>
        <div class="subtexto-institucional">Secretaria Municipal de Educação</div>
        <div class="setor-institucional">Alimentação Escolar</div>
    </div>

    <div class="pasta-drive-container">
        <a href="https://drive.google.com/drive/folders/16ASkFUh8WkDtsB_Dks2aLzJSmFQ-w5ZI" target="_blank" class="link-pasta-drive">
            📂 Abrir Pasta de Orientações Técnicas (Google Drive)
        </a>
    </div>

    <div class="identificacao-container" id="blocoInfo">
        <div class="campo-id">
            <label for="txtUnidade">Unidade Escolar:</label>
            <input type="text" id="txtUnidade" class="input-id" placeholder="Ex: Escola Municipal Tereza">
        </div>
        <div class="campo-id">
            <label for="txtData">Data da Visita:</label>
            <input type="date" id="txtData" class="input-id">
        </div>
        <div class="campo-id">
            <label for="txtNutricionista">Nutricionista / Aplicador:</label>
            <input type="text" id="txtNutricionista" class="input-id" placeholder="Nome completo">
        </div>
    </div>

    <form id="checklistForm">
        <div class="perguntas-container" id="containerDinamico"></div>
        <div id="resultado"></div>
        <div class="botoes-container" id="blocoAcoes">
            <button type="button" class="btn-calcular" onclick="calcularNotaFinal()">Calcular Nota</button>
            <button type="button" class="btn-pdf" id="btnGerarPDF" onclick="gerarPDFNativo()">Salvar PDF Compacto 📄</button>
        </div>
    </form>
</div>

<script>
    const checklistDados = [
        {

                { id: "q2_3", txt: "2.3 As unhas estão curtas, limpas e sem esmalte?", max: 2.0 },

        {

            ]
        },

            perguntas: [

                { id: "q6_5", txt: "6.5 Usam papel toalha ou pano descartável?", max: 1.0 },
                { id: "q6_6", txt: "6.6 A ventilação é adequada?", max: 1.0 },

    const container = document.getElementById('containerDinamico');
    checklistDados.forEach(secaoBloco => {
        const divSecao = document.createElement('div');
        divSecao.className = 'secao-titulo';
        divSecao.innerText = secaoBloco.secao;
        container.appendChild(divSecao);

        secaoBloco.perguntas.forEach(p => {
            const bloco = document.createElement('div');
            bloco.className = 'pergunta-bloco';
            bloco.id = `bloco_${p.id}`;
            bloco.innerHTML = `
                <div class="pergunta-texto">${p.txt} <span class="pergunta-peso">(${p.max} pts)</span></div>
                <div class="opcoes">
                    <input type="radio" id="${p.id}_s" name="${p.id}" value="SIM" data-weight="${p.max}" onchange="gerenciarRegra('${p.id}')"><label for="${p.id}_s">SIM</label>
                    <input type="radio" id="${p.id}_p" name="${p.id}" value="PARCIAL" data-weight="${p.max * 0.5}" onchange="gerenciarRegra('${p.id}')"><label for="${p.id}_p">PARC</label>
                    <input type="radio" id="${p.id}_n" name="${p.id}" value="NAO" data-weight="0" onchange="gerenciarRegra('${p.id}')"><label for="${p.id}_n">NÃO</label>
                    <input type="radio" id="${p.id}_no" name="${p.id}" value="NO" onchange="gerenciarRegra('${p.id}')"><label for="${p.id}_no">N.O.</label>
                </div>
                <div class="obs-container">
                    <textarea class="obs-input" rows="1" placeholder="Observação..." oninput="ajustarAltura(this)"></textarea>
                </div>
            `;
            container.appendChild(bloco);
        });
    });

    function gerenciarRegra(perguntaId) {
        const bloco = document.getElementById(`bloco_${perguntaId}`);
        const radios = document.getElementsByName(perguntaId);
        let marcado = "";

        for (let r = 0; r < radios.length; r++) {
            if (radios[r].checked) { marcado = radios[r].value; break; }
        }

        // Regra do N.O.: Oculta o bloco inteiro no PDF impresso se não foi observado
        if (marcado === "NO") {
            bloco.classList.add('ocultar-no-print');
        } else {
            bloco.classList.remove('ocultar-no-print');
        }
    }

    const temaAtual = localStorage.getItem('tema') || 'light';
    if (temaAtual === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('btnTema').innerText = "Modo Claro ☀️";
    }

    function alternarTema() {
        const t = document.documentElement.getAttribute('data-theme');
        if (t === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('tema', 'light');
            document.getElementById('btnTema').innerText = "Modo Dark 🌙";
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('tema', 'dark');
            document.getElementById('btnTema').innerText = "Modo Claro ☀️";
        }
    }

    function ajustarAltura(element) {
        element.style.height = "auto";
        element.style.height = element.scrollHeight + "px";
    }

    function calcularNotaFinal() {
        let pointsObtained = 0;
        let maxPossiblePoints = 0;

        checklistDados.forEach(secaoBloco => {
            secaoBloco.perguntas.forEach(p => {
                const radios = document.getElementsByName(p.id);
                for (let r = 0; r < radios.length; r++) {
                    if (radios[r].checked) {
                        if (radios[r].value !== 'NO') {
                            maxPossiblePoints += p.max;
                            pointsObtained += parseFloat(radios[r].getAttribute('data-weight'));
                        }
                        break;
                    }
                }
            });
        });

        const resultadoDiv = document.getElementById('resultado');
        if (maxPossiblePoints > 0) {
            const percentual = ((pointsObtained / maxPossiblePoints) * 100).toFixed(2);
            let corHex = "#e74c3c";
            let classificacao = "Crítico! Intervenção Requerida.";
            
            if (percentual >= 90) { corHex = "#2ecc71"; classificacao = "🏆 Excelente Adequação!"; }
            else if (percentual >= 70) { corHex = "#27ae60"; classificacao = "👍 Boa Adequação."; }
            else if (percentual >= 50) { corHex = "#f39c12"; classificacao = "⚠️ Nível Regular."; }

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            
            resultadoDiv.innerHTML = `
                <strong style="font-size: 13px; color: ${isDark ? '#ffffff' : '#2c3e50'};">RESUMO FINAL DE ADEQUAÇÃO</strong>
                <div class="grid-resumo">
                    <div><strong>Obtido:</strong> ${pointsObtained.toFixed(2)} pts</div>
                    <div><strong>Máximo Válido:</strong> ${maxPossiblePoints.toFixed(2)} pts</div>
                </div>
                <div style="font-size: 24px; font-weight: bold; color: ${corHex}; margin: 3px 0;">${percentual}%</div>
                <span style="font-size: 12px; font-weight: bold; color: ${isDark ? '#e0e0e0' : '#34495e'};">${classificacao}</span>
            `;
            
            document.getElementById('btnGerarPDF').style.display = 'block';
        } else {
            resultadoDiv.innerHTML = "Nenhum item válido selecionado (Todos N.O.).";
        }
        resultadoDiv.style.display = 'block';
        resultadoDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function gerarPDFNativo() {
        window.print();
    }
</script>
